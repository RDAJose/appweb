<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reunión de Arte</title>

    <!-- Responsive (CLAVE para móvil/app) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 15px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            background: black;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .hidden {
            display: none;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .logout {
            background: #eee;
            color: black;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div id="login-section">
        <h1>Reunión de Arte</h1>

        <input id="username" placeholder="Email">
        <input id="password" type="password" placeholder="Password">

        <button onclick="login()">Login</button>
        <button onclick="register()">Register</button>
    </div>

    <!-- APP -->
    <div id="app-section" class="hidden">

        <div class="topbar">
            <h2>Feed</h2>
            <button class="logout" onclick="logout()">Salir</button>
        </div>

        <!-- CREAR POST -->
        <div class="card">
            <h3>Nuevo Post</h3>
            <input id="title" placeholder="Título">
            <textarea id="content" placeholder="Contenido"></textarea>
            <button onclick="createPost()">Publicar</button>
        </div>

        <!-- POSTS -->
        <div id="feed-section">
            <div id="posts"></div>
        </div>

        <div id="profile-section" class="hidden">
            <div class="card">
                <h3>Perfil</h3>
                <p>Tu perfil aparecerá aquí</p>
            </div>
        </div>

    </div>

</div>

<script>
  console.log("HTML CARGADO");
</script>

<script src="./js/app.js"></script>

<div class="bottom-nav">
    <button onclick="showFeed()">Inicio</button>
    <button onclick="showProfile()">Perfil</button>
</div>
</body>
</html>
