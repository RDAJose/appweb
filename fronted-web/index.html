<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AppWeb</title>

    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        input, textarea {
            width: 100%;
            margin: 5px 0;
            padding: 8px;
        }

        button {
            padding: 10px;
            margin-top: 5px;
            cursor: pointer;
        }

        .post {
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<h1>AppWeb</h1>

<!-- LOGIN -->
<div id="login-section">
    <h2>Login</h2>
    <input id="username" placeholder="username">
    <input id="password" type="password" placeholder="password">
    <button onclick="login()">Login</button>
</div>

<button onclick="register()">Register</button>

<!-- APP -->
<div id="app-section" class="hidden">

    <h2>Crear Post</h2>
    <input id="title" placeholder="Título">
    <textarea id="content" placeholder="Contenido"></textarea>
    <button onclick="createPost()">Crear</button>

    <hr>

    <h2>Posts</h2>
    <div id="posts"></div>

</div>

<script>
  console.log("HTML CARGADO");
</script>

<script type="module" src="./js/app.js"></script>

</body>
</html>
